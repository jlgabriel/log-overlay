[log]
# Path to the log file to monitor.
# If empty, the app will try to auto-detect X-Plane's Log.txt.
# Examples:
#   path = C:\X-Plane 12\Log.txt
#   path = D:\Games\X-Plane 12\Log.txt
path =

[overlay]
# Number of log lines to display
lines = 15

# Window opacity (0.0 = invisible, 1.0 = fully opaque)
opacity = 0.80

# Font size in points
font_size = 11

# Screen position: top-left, top-right, bottom-left, bottom-right, center
position = top-right

# Margin from screen edge in pixels
margin = 20

[colors]
# Enable color-coded lines (errors = red, warnings = yellow)
color_coding = true

# Color for error lines (ERROR, FAIL, CRASH, EXCEPTION, FATAL)
color_error = #ff6b6b

# Color for warning lines (WARNING, WARN, W/, CAUTION)
color_warning = #ffd93d

# Color for normal lines
color_normal = #e0e0e0

# Background color
background = #1a1a2e
